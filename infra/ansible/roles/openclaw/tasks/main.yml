---
- name: Locate openclaw binary
  shell: "find /usr /home/{{ ansible_user }} /opt /snap -name openclaw -type f 2>/dev/null | head -1"
  register: openclaw_bin
  changed_when: false
  failed_when: openclaw_bin.stdout | length == 0

- name: Show openclaw path
  debug:
    msg: "openclaw found at: {{ openclaw_bin.stdout }}"

- name: Disable LLM idle timeout (Ollama responses can be slow)
  shell: "{{ openclaw_bin.stdout }} config set agents.defaults.llm.idleTimeoutSeconds 0"
  changed_when: true

- name: Restart OpenClaw gateway to apply config
  shell: "{{ openclaw_bin.stdout }} restart"
  changed_when: true

- name: Verify OpenClaw config
  shell: "{{ openclaw_bin.stdout }} doctor"
  register: doctor_result
  changed_when: false
  failed_when: false

- name: Show OpenClaw doctor output
  debug:
    msg: "{{ doctor_result.stdout_lines }}"
