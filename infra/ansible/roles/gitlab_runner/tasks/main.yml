---
- name: Ensure GitLab Runner token is provided
  ansible.builtin.assert:
    that:
      - gitlab_runner_token is defined
      - gitlab_runner_token | length > 0
    fail_msg: "gitlab_runner_token is required to register the GitLab Runner"
  no_log: true

# ── Docker CE (repositorio oficial) ─────────────────────────────────────────

- name: Install Docker apt prerequisites
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true

- name: Create Docker keyring directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /tmp/docker.asc
    mode: "0644"

- name: Dearmor Docker GPG key
  ansible.builtin.command:
    cmd: gpg --dearmor --yes --output /etc/apt/keyrings/docker.gpg /tmp/docker.asc
  changed_when: true

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    filename: docker
    state: present
    update_cache: true

- name: Install Docker CE
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Ensure Docker service is enabled and running
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Wait for Docker socket to be ready
  ansible.builtin.wait_for:
    path: /var/run/docker.sock
    state: present
    timeout: 30

- name: Remove temporary Docker GPG key
  ansible.builtin.file:
    path: /tmp/docker.asc
    state: absent

# ── GitLab Runner como contenedor Docker ─────────────────────────────────────

- name: Create GitLab Runner config directory
  ansible.builtin.file:
    path: /srv/gitlab-runner/config
    state: directory
    mode: "0700"

- name: Check if gitlab-runner container exists
  ansible.builtin.command: docker inspect gitlab-runner
  register: runner_container_check
  failed_when: false
  changed_when: false

- name: Start GitLab Runner container
  ansible.builtin.command: >-
    docker run --detach
    --name gitlab-runner
    --restart always
    --volume /srv/gitlab-runner/config:/etc/gitlab-runner
    --volume /var/run/docker.sock:/var/run/docker.sock
    gitlab/gitlab-runner:alpine
  when: runner_container_check.rc != 0

- name: Check GitLab Runner registration
  ansible.builtin.stat:
    path: /srv/gitlab-runner/config/config.toml
  register: gitlab_runner_config

- name: Read GitLab Runner config
  ansible.builtin.slurp:
    path: /srv/gitlab-runner/config/config.toml
  register: gitlab_runner_config_content
  when: gitlab_runner_config.stat.exists
  no_log: true

- name: Set runner registration state
  ansible.builtin.set_fact:
    gitlab_runner_registered: >-
      {{
        gitlab_runner_config.stat.exists
        and 'name = "elitemini-linux-docker"' in (gitlab_runner_config_content.content | b64decode)
      }}
  no_log: true

- name: Verify GitLab is reachable from runner container
  ansible.builtin.command: >-
    docker exec gitlab-runner curl -sk --max-time 10
    -o /dev/null -w "%{http_code}"
    {{ gitlab_runner_url | default('https://gitlab.innovateoncorp.com') }}
  register: gitlab_reachability
  changed_when: false
  failed_when: gitlab_reachability.rc != 0

- name: Register GitLab Runner via docker run --rm
  ansible.builtin.command:
    cmd: >-
      docker run --rm
      --volume /srv/gitlab-runner/config:/etc/gitlab-runner
      gitlab/gitlab-runner:alpine register
      --non-interactive
      --url "{{ gitlab_runner_url | default('https://gitlab.innovateoncorp.com') }}"
      --token "{{ gitlab_runner_token }}"
      --executor docker
      --docker-image ubuntu:24.04
      --docker-volumes /var/run/docker.sock:/var/run/docker.sock
      --description elitemini-linux-docker
      --tag-list linux,docker,elitemini
      --run-untagged=false
      --locked=false
  when: not gitlab_runner_registered
  no_log: true
  register: gitlab_runner_register_result
  failed_when: false

- name: Show runner container logs on registration failure
  ansible.builtin.command: docker logs --tail 30 gitlab-runner
  register: runner_logs
  changed_when: false
  when:
    - not gitlab_runner_registered
    - gitlab_runner_register_result.rc is defined
    - gitlab_runner_register_result.rc != 0

- name: Print runner logs
  ansible.builtin.debug:
    msg: "{{ runner_logs.stdout_lines + runner_logs.stderr_lines }}"
  when:
    - runner_logs is defined
    - runner_logs.stdout_lines is defined

- name: Fail if registration failed
  ansible.builtin.fail:
    msg: "GitLab Runner registration failed (rc={{ gitlab_runner_register_result.rc }}). Ver logs del contenedor arriba."
  when:
    - not gitlab_runner_registered
    - gitlab_runner_register_result.rc is defined
    - gitlab_runner_register_result.rc != 0

- name: Restart GitLab Runner container after registration
  ansible.builtin.command: docker restart gitlab-runner
  when: gitlab_runner_register_result.changed
