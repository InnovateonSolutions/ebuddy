---
- name: Set node_exporter architecture
  ansible.builtin.set_fact:
    node_exporter_arch: "{{ 'arm64' if ansible_architecture in ['aarch64', 'arm64'] else 'amd64' }}"

- name: Create temporary directory for node_exporter
  ansible.builtin.tempfile:
    state: directory
    suffix: node_exporter
  register: node_exporter_tmpdir

- name: Download node_exporter release archive
  ansible.builtin.get_url:
    url: "https://github.com/prometheus/node_exporter/releases/download/v1.8.2/node_exporter-1.8.2.linux-{{ node_exporter_arch }}.tar.gz"
    dest: "{{ node_exporter_tmpdir.path }}/node_exporter.tar.gz"
    mode: "0644"

- name: Extract node_exporter archive
  ansible.builtin.unarchive:
    src: "{{ node_exporter_tmpdir.path }}/node_exporter.tar.gz"
    dest: "{{ node_exporter_tmpdir.path }}"
    remote_src: true

- name: Install node_exporter binary
  ansible.builtin.copy:
    src: "{{ node_exporter_tmpdir.path }}/node_exporter-1.8.2.linux-{{ node_exporter_arch }}/node_exporter"
    dest: /usr/local/bin/node_exporter
    mode: "0755"
    remote_src: true
  notify: Restart node_exporter

- name: Install node_exporter systemd unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/node_exporter.service
    mode: "0644"
    content: |
      [Unit]
      Description=Node Exporter
      After=network.target

      [Service]
      User=root
      ExecStart=/usr/local/bin/node_exporter
      Restart=always
      RestartSec=5

      [Install]
      WantedBy=multi-user.target
  notify: Restart node_exporter

- name: Flush node_exporter handlers
  ansible.builtin.meta: flush_handlers

- name: Ensure node_exporter service is enabled and running
  ansible.builtin.systemd:
    name: node_exporter
    state: started
    enabled: true
    daemon_reload: true

- name: Clean temporary directory
  ansible.builtin.file:
    path: "{{ node_exporter_tmpdir.path }}"
    state: absent
