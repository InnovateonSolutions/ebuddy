stages:
  - build
  - validate

variables:
  CI_IMAGE: registry.digitalocean.com/ebuddy-prod/ci:latest

default:
  tags:
    - linux
    - docker
    - elitemini

# ── Build CI image ───────────────────────────────────────────────────────────
# Requiere DO_TOKEN como variable en GitLab:
# Settings → CI/CD → Variables → DO_TOKEN (masked)

build-ci-image:
  stage: build
  image: docker:27
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  rules:
    - changes:
        - infra/docker/ci/Dockerfile
    - when: manual
      allow_failure: true
  script:
    - mkdir -p ~/.docker
    - echo "{\"auths\":{\"registry.digitalocean.com\":{\"auth\":\"$(printf 'docr:%s' "$DO_TOKEN" | base64 | tr -d '\n')\"}}}" > ~/.docker/config.json
    - docker build --pull -t $CI_IMAGE infra/docker/ci/
    - docker push $CI_IMAGE
    - rm -f ~/.docker/config.json

# ── Validate ─────────────────────────────────────────────────────────────────

python-structural-tests:
  stage: validate
  image: $CI_IMAGE
  needs:
    - job: build-ci-image
      optional: true
  script:
    - python3 -m pytest scripts/tests/ -v --tb=short

ansible-syntax:
  stage: validate
  image: $CI_IMAGE
  needs:
    - job: build-ci-image
      optional: true
  script:
    - ANSIBLE_CONFIG=infra/ansible/ansible.cfg ansible-playbook --syntax-check infra/ansible/playbooks/install-gitlab-runner.yml --extra-vars "gitlab_runner_token=dummy"
