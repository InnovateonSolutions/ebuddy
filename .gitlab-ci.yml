include:
  - local: .gitlab/ci/validate.yml
  - local: .gitlab/ci/terraform.yml
  - local: .gitlab/ci/deploy.yml
  - local: .gitlab/ci/setup.yml
  - local: .gitlab/ci/operations.yml

stages:
  - build
  - validate
  - plan
  - apply
  - deploy
  - setup
  - ops

variables:
  CI_IMAGE: registry.digitalocean.com/ebuddy-prod/ci:latest

default:
  tags:
    - linux
    - docker
    - elitemini

# ── Build CI image ────────────────────────────────────────────────────────────
# Solo corre cuando cambia el Dockerfile, o manualmente.
# Prerequisito: DO_TOKEN en GitLab CI/CD Variables.

build-ci-image:
  stage: build
  image: docker:27
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  rules:
    - changes:
        - infra/docker/ci/Dockerfile
    - when: manual
      allow_failure: true
  script:
    - mkdir -p ~/.docker
    - echo "{\"auths\":{\"registry.digitalocean.com\":{\"auth\":\"$(printf 'docr:%s' "$DO_TOKEN" | base64 | tr -d '\n')\"}}}" > ~/.docker/config.json
    - docker build --pull -t $CI_IMAGE infra/docker/ci/
    - docker push $CI_IMAGE
    - rm -f ~/.docker/config.json
