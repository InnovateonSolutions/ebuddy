# ─── Local dev: Next.js + PostgreSQL ───────────────────────────
# Uso: docker compose up -d
# App:  http://localhost:3000
# DB:   localhost:5432

name: ebuddy-local

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports:
      - "3000:3000"
    env_file: .env.local
    environment:
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ebuddy

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ebuddy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ebuddy_local}
      POSTGRES_DB: ebuddy
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ebuddy"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ebuddy

volumes:
  pg-data:

networks:
  ebuddy:
    driver: bridge
