name: Bootstrap — Infra + Secrets + Deploy

on:
  workflow_dispatch:
    inputs:
      manage_dns:
        description: 'Crear/actualizar Route 53 desde Terraform'
        required: true
        default: false
        type: boolean
      force_rerun:
        description: 'Permitir repetir el bootstrap aunque ya exista una corrida exitosa'
        required: true
        default: false
        type: boolean

permissions:
  actions: read
  id-token: write
  contents: read

concurrency:
  group: bootstrap-deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  NEXT_PUBLIC_APP_URL: https://ebuddy.innovateoncorp.com

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      app_name: ${{ steps.config.outputs.app_name }}
      environment: ${{ steps.config.outputs.environment }}
      droplet_name: ${{ steps.config.outputs.droplet_name }}
      image_name: ${{ steps.config.outputs.image_name }}
      app_url: ${{ steps.config.outputs.app_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Guard against repeated bootstrap
        if: ${{ github.event.inputs.force_rerun != 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const workflow_id = 'bootstrap-deploy.yml';
            const branch = context.ref.replace('refs/heads/', '');

            const runs = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id,
              branch,
              event: 'workflow_dispatch',
              status: 'completed',
              per_page: 50,
            });

            const priorSuccessfulRun = runs.data.workflow_runs.find((run) =>
              run.id !== context.runId && run.conclusion === 'success'
            );

            if (priorSuccessfulRun) {
              core.setFailed(
                `Bootstrap ya fue ejecutado exitosamente en ${branch} (run #${priorSuccessfulRun.run_number}). ` +
                `Si realmente quieres repetirlo, vuelve a correr este workflow con force_rerun=true.`
              );
            }

      - name: Load deployment config
        id: config
        run: |
          source infra/config/main.env
          echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT
          echo "environment=$ENVIRONMENT" >> $GITHUB_OUTPUT
          echo "droplet_name=${APP_NAME}-${ENVIRONMENT}-droplet" >> $GITHUB_OUTPUT
          echo "image_name=registry.digitalocean.com/${APP_NAME}-${ENVIRONMENT}/${APP_NAME}" >> $GITHUB_OUTPUT
          echo "app_url=$NEXT_PUBLIC_APP_URL" >> $GITHUB_OUTPUT

  infra:
    name: Stage 1 — Infrastructure
    runs-on: ubuntu-latest
    needs: preflight
    timeout-minutes: 30
    defaults:
      run:
        working-directory: infra/terraform
    env:
      TF_VAR_do_token: ${{ secrets.DO_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Derive SSH public key from deploy key
        working-directory: ${{ github.workspace }}
        run: |
          umask 077
          printf '%s\n' '${{ secrets.DO_SSH_PRIVATE_KEY }}' > /tmp/ebuddy-deploy-key
          echo "TF_VAR_ssh_pub_key=$(ssh-keygen -y -f /tmp/ebuddy-deploy-key)" >> $GITHUB_ENV

      - name: Configure AWS credentials (OIDC)
        if: ${{ github.event.inputs.manage_dns == 'true' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROUTE53_ROLE_ARN }}
          aws-region: us-east-1

      - name: Create Terraform state bucket (idempotent)
        working-directory: ${{ github.workspace }}
        run: |
          AWS_ACCESS_KEY_ID=${{ secrets.DO_SPACES_ACCESS_KEY }} \
          AWS_SECRET_ACCESS_KEY=${{ secrets.DO_SPACES_SECRET_KEY }} \
          aws s3api create-bucket \
            --bucket ebuddy-tfstate \
            --region us-east-1 \
            --endpoint-url https://nyc3.digitaloceanspaces.com 2>&1 \
            | grep -v "BucketAlreadyOwnedByYou" || true

      - name: Load config → TF_VAR_*
        working-directory: ${{ github.workspace }}
        run: |
          source infra/config/main.env
          echo "TF_VAR_do_region=$DO_REGION"       >> $GITHUB_ENV
          echo "TF_VAR_app_name=$APP_NAME"         >> $GITHUB_ENV
          echo "TF_VAR_environment=$ENVIRONMENT"   >> $GITHUB_ENV
          echo "TF_VAR_domain_name=$DOMAIN_NAME"   >> $GITHUB_ENV
          echo "TF_VAR_droplet_size=$DROPLET_SIZE" >> $GITHUB_ENV
          echo "TF_VAR_registry_subscription_tier=${REGISTRY_SUBSCRIPTION_TIER:-basic}" >> $GITHUB_ENV
          echo "TF_VAR_alert_email=$ALERT_EMAIL"   >> $GITHUB_ENV
          echo "TF_VAR_enable_route53=${{ github.event.inputs.manage_dns }}" >> $GITHUB_ENV

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~> 1.7'

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="access_key=${{ secrets.DO_SPACES_ACCESS_KEY }}" \
            -backend-config="secret_key=${{ secrets.DO_SPACES_SECRET_KEY }}"

      - name: Terraform Apply
        run: terraform apply -auto-approve -no-color

  build:
    name: Stage 2 — Build & Push
    runs-on: ubuntu-latest
    needs: [preflight, infra]
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_TOKEN }}

      - name: Cleanup old images
        run: |
          REGISTRY="${{ needs.preflight.outputs.app_name }}-${{ needs.preflight.outputs.environment }}"
          REPO="${{ needs.preflight.outputs.app_name }}"

          doctl registry repository list-tags "$REGISTRY/$REPO" \
            --no-header --format Tag 2>/dev/null \
          | grep -v -E "^latest$|^buildcache$" \
          | while read tag; do
              doctl registry repository delete-tag "$REGISTRY/$REPO" "$tag" --force
            done

          doctl registry garbage-collection start "$REGISTRY" --force --include-untagged-manifests 2>&1 \
            | grep -v "only one active garbage collection" || true

      - run: doctl registry login --expiry-seconds 1200

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.preflight.outputs.image_name }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ needs.preflight.outputs.app_url }}
          cache-from: type=registry,ref=${{ needs.preflight.outputs.image_name }}:buildcache
          cache-to: type=registry,ref=${{ needs.preflight.outputs.image_name }}:buildcache,mode=max

  migrate:
    name: Stage 3 — Database Migrations
    runs-on: ubuntu-latest
    needs: infra
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Apply pending migrations
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL no configurada; se omiten migraciones en este bootstrap."
            exit 0
          fi

          npx drizzle-kit migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  deploy:
    name: Stage 4 — Sync Secrets & Deploy
    runs-on: ubuntu-latest
    needs: [preflight, build, migrate]
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Get Droplet IP
        id: droplet
        run: |
          IP=$(curl -sf \
            "https://api.digitalocean.com/v2/droplets?name=${{ needs.preflight.outputs.droplet_name }}" \
            -H "Authorization: Bearer ${{ secrets.DO_TOKEN }}" \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          droplets = data.get('droplets', [])
          if not droplets:
              raise SystemExit('Droplet not found')
          nets = droplets[0]['networks']['v4']
          ip = next(n['ip_address'] for n in nets if n['type'] == 'public')
          print(ip)
          ")
          echo "ip=$IP" >> $GITHUB_OUTPUT
          echo "✓ Droplet IP: $IP"

      - name: Wait for cloud-init and SSH
        env:
          HOST: ${{ steps.droplet.outputs.ip }}
        run: |
          umask 077
          printf '%s\n' '${{ secrets.DO_SSH_PRIVATE_KEY }}' > /tmp/ebuddy-deploy-key

          for _ in $(seq 1 30); do
            if ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
              -i /tmp/ebuddy-deploy-key root@"$HOST" 'test -x /usr/local/bin/ebuddy-deploy'; then
              echo "✓ Droplet listo para deploy"
              exit 0
            fi
            sleep 10
          done

          echo "ERROR: El Droplet no quedo listo a tiempo" >&2
          exit 1

      - name: Sync runtime env
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ steps.droplet.outputs.ip }}
          username: root
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          envs: NEXT_PUBLIC_APP_URL
          script: |
            cat > /opt/ebuddy/.env << ENVEOF
            NEXT_PUBLIC_APP_URL=$NEXT_PUBLIC_APP_URL
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            AUTH_SECRET=${{ secrets.AUTH_SECRET }}
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            GOOGLE_REDIRECT_URI=${{ secrets.GOOGLE_REDIRECT_URI }}
            MICROSOFT_CLIENT_ID=${{ secrets.MICROSOFT_CLIENT_ID }}
            MICROSOFT_CLIENT_SECRET=${{ secrets.MICROSOFT_CLIENT_SECRET }}
            MICROSOFT_TENANT_ID=${{ secrets.MICROSOFT_TENANT_ID }}
            MICROSOFT_REDIRECT_URI=${{ secrets.MICROSOFT_REDIRECT_URI }}
            ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            ENVEOF
            chmod 600 /opt/ebuddy/.env
            /usr/local/bin/ebuddy-deploy
        env:
          NEXT_PUBLIC_APP_URL: ${{ needs.preflight.outputs.app_url }}

  e2e:
    name: Stage 5 — Verification
    runs-on: ubuntu-latest
    needs: [preflight, deploy]
    timeout-minutes: 15

    steps:
      - name: Wait for container startup
        run: sleep 60

      - name: Health endpoint returns ok
        run: |
          BODY=$(curl -sf ${{ needs.preflight.outputs.app_url }}/api/health)
          echo "$BODY"
          echo "$BODY" | grep -q '"status":"ok"' || { echo "FAIL: health check"; exit 1; }
          echo "PASS: /api/health"

      - name: Login page is reachable
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ needs.preflight.outputs.app_url }}/login)
          [ "$STATUS" = "200" ] || { echo "FAIL: /login returned $STATUS"; exit 1; }
          echo "PASS: /login"

      - name: Protected routes reject unauthenticated requests
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ needs.preflight.outputs.app_url }}/api/tickets/today)
          [ "$STATUS" = "401" ] || { echo "FAIL: /api/tickets/today returned $STATUS (expected 401)"; exit 1; }
          echo "PASS: auth protection on /api/tickets/today"

      - name: Root is reachable
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L ${{ needs.preflight.outputs.app_url }}/)
          [ "$STATUS" = "200" ] || { echo "FAIL: / returned $STATUS"; exit 1; }
          echo "PASS: root"
