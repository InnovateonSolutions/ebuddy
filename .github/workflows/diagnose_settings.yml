name: Diagnose Settings Error
on: workflow_dispatch
jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Get Droplet IP
        id: droplet
        run: |
          source infra/config/main.env
          IP=$(curl -sf "https://api.digitalocean.com/v2/droplets?name=${APP_NAME}-${ENVIRONMENT}-droplet" \
            -H "Authorization: Bearer ${{ secrets.DO_TOKEN }}" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(next(n['ip_address'] for n in d['droplets'][0]['networks']['v4'] if n['type']=='public'))")
          echo "ip=$IP" >> $GITHUB_OUTPUT
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ steps.droplet.outputs.ip }}
          username: root
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          script: |
            docker run --rm --env-file /opt/ebuddy/.env \
              --entrypoint "" \
              postgres:16-alpine \
              sh -c 'psql "$DATABASE_URL" -c "
                CREATE EXTENSION IF NOT EXISTS pgcrypto;
                ALTER TABLE user_preferences ADD COLUMN IF NOT EXISTS api_key_hash text;
                ALTER TABLE user_preferences ADD COLUMN IF NOT EXISTS api_key_preview text;
                ALTER TABLE user_preferences DROP COLUMN IF EXISTS api_key;
                DROP TABLE IF EXISTS visit_counter;
                SELECT column_name FROM information_schema.columns WHERE table_name='\''user_preferences'\'';
              " 2>&1' || docker run --rm \
              --env-file /opt/ebuddy/.env \
              registry.digitalocean.com/ebuddy-dev/ebuddy:migrator 2>&1
