name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write
  actions: write  # necesario para que deploy.yml pueda usar cache-to: type=gha

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      app_changed: ${{ steps.filter.outputs.app_changed }}
      infra_changed: ${{ steps.filter.outputs.infra_changed }}
      scripts_changed: ${{ steps.filter.outputs.scripts_changed }}
      ansible_changed: ${{ steps.filter.outputs.ansible_changed }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect application and infrastructure changes
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi

          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="$(git rev-list --max-parents=0 HEAD | tail -n 1)"
          fi

          CHANGED_FILES="$(git diff --name-only "$BASE_SHA" "$GITHUB_SHA")"
          echo "$CHANGED_FILES"

          app_changed=false
          infra_changed=false
          scripts_changed=false
          ansible_changed=false

          while IFS= read -r file; do
            [ -n "$file" ] || continue

            case "$file" in
              app/*|features/*|components/*|hooks/*|lib/*|types/*|public/*|db/*|drizzle/*|middleware.ts|package.json|package-lock.json|tsconfig.json|next.config.*|tailwind.config.ts|postcss.config.js|drizzle.config.ts|Dockerfile|docker-compose.yml|docker-compose.prod.yml|infra/caddy/*|.github/workflows/deploy.yml)
                app_changed=true
                ;;
            esac

            case "$file" in
              infra/*|.github/workflows/terraform.yml)
                infra_changed=true
                ;;
            esac

            case "$file" in
              scripts/*|docs/iam/*|.github/workflows/ci.yml|.github/workflows/setup.yml|infra/ansible/*)
                scripts_changed=true
                ;;
            esac

            case "$file" in
              infra/ansible/*|.github/workflows/setup.yml)
                ansible_changed=true
                ;;
            esac
          done <<EOF
          $CHANGED_FILES
          EOF

          echo "app_changed=$app_changed" >> "$GITHUB_OUTPUT"
          echo "infra_changed=$infra_changed" >> "$GITHUB_OUTPUT"
          echo "scripts_changed=$scripts_changed" >> "$GITHUB_OUTPUT"
          echo "ansible_changed=$ansible_changed" >> "$GITHUB_OUTPUT"

  node-tests:
    name: Node Tests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs['detect-changes'].outputs.app_changed == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:run
        env:
          ANTHROPIC_API_KEY: test-dummy
          OPENAI_API_KEY: test-dummy
          AUTH_SECRET: test-dummy-secret-32-chars-minimum
          DATABASE_URL: postgresql://ebuddy:ebuddy@localhost:5432/ebuddy

      - name: Typecheck
        run: npx tsc --noEmit

  browser-e2e:
    name: Browser E2E
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs['detect-changes'].outputs.app_changed == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser navigation tests
        run: npm run test:e2e

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs['detect-changes'].outputs.scripts_changed == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements-test.txt

      - name: Install test dependencies
        run: pip install -r scripts/requirements-test.txt

      - name: Run pytest
        run: python3 -m pytest scripts/tests/ -v --tb=short

  terratest:
    name: Terraform Module Tests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs['detect-changes'].outputs.infra_changed == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: |
            scripts/go.mod
            scripts/go.sum

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~> 1.7'

      - name: Resolve Go modules
        working-directory: scripts
        run: go mod tidy

      - name: Verify Go module files are committed
        run: |
          git diff --exit-code -- scripts/go.mod scripts/go.sum

      - name: Run Terratest
        working-directory: scripts
        run: go test ./terratest/... -v

  terraform-plan:
    name: Terraform Plan
    needs: [detect-changes, terratest]
    if: needs['detect-changes'].outputs.infra_changed == 'true'
    uses: ./.github/workflows/terraform.yml
    with:
      action: plan
      manage_dns: true
    secrets: inherit

  terraform-apply:
    name: Terraform Apply
    needs: [detect-changes, terraform-plan]
    if: needs['detect-changes'].outputs.infra_changed == 'true' && github.event_name == 'push'
    uses: ./.github/workflows/terraform.yml
    with:
      action: apply
      manage_dns: true
    secrets: inherit

  elitemini-setup:
    name: Elitemini Setup
    needs: [detect-changes, python-tests, terratest, terraform-plan]
    if: |
      always() &&
      github.event_name == 'push' &&
      needs['detect-changes'].outputs.ansible_changed == 'true' &&
      (needs.python-tests.result == 'success' || needs.python-tests.result == 'skipped') &&
      (needs.terratest.result == 'success' || needs.terratest.result == 'skipped') &&
      (needs.terraform-plan.result == 'success' || needs.terraform-plan.result == 'skipped')
    uses: ./.github/workflows/setup.yml
    with:
      target: elitemini
      playbook: install-node-exporter
    secrets: inherit
