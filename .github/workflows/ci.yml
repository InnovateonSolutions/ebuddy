name: CI — Unit Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'infra/**'
      - '*.md'
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:run
        env:
          # Tests usan mocks — no se llama a ninguna API real.
          # Estas vars satisfacen la importación del módulo sin ejecutar validación.
          ANTHROPIC_API_KEY: test-dummy
          OPENAI_API_KEY: test-dummy
          AUTH_SECRET: test-dummy-secret-32-chars-minimum
          DATABASE_URL: postgresql://ebuddy:ebuddy@localhost:5432/ebuddy
