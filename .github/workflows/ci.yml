name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  pull_request:
    branches: [main]

jobs:
  node-tests:
    name: Node Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:run
        env:
          ANTHROPIC_API_KEY: test-dummy
          OPENAI_API_KEY: test-dummy
          AUTH_SECRET: test-dummy-secret-32-chars-minimum
          DATABASE_URL: postgresql://ebuddy:ebuddy@localhost:5432/ebuddy

      - name: Typecheck
        run: npx tsc --noEmit

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements-test.txt

      - name: Install test dependencies
        run: pip install -r scripts/requirements-test.txt

      - name: Run pytest
        run: python3 -m pytest scripts/tests/ -v --tb=short

  terratest:
    name: Terraform Module Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: |
            scripts/go.mod
            scripts/go.sum

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~> 1.7'

      - name: Resolve Go modules
        working-directory: scripts
        run: go mod tidy

      - name: Verify Go module files are committed
        run: |
          git diff --exit-code -- scripts/go.mod scripts/go.sum

      - name: Run Terratest
        working-directory: scripts
        run: go test ./terratest/... -v
