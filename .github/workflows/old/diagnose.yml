name: Diagnose
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Get Droplet IP
        id: droplet
        run: |
          IP=$(DROPLET_NAME="ebuddy-prod-droplet" DO_TOKEN="${{ secrets.DO_TOKEN }}" \
            python3 scripts/get-droplet-ip.py)
          echo "ip=$IP" >> $GITHUB_OUTPUT

      - name: Fetch app logs
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ steps.droplet.outputs.ip }}
          username: root
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          capture_stdout: true
          script: |
            echo "=== docker logs (últimas 100 líneas) ==="
            docker logs ebuddy-prod-app-1 --tail 100 2>&1 || \
              docker compose -f /opt/ebuddy/docker-compose.prod.yml logs app --tail 100 2>&1
            echo "=== containers ==="
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
