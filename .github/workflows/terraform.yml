name: Terraform — Infrastructure

on:
  workflow_call:
    inputs:
      action:
        description: 'Accion a ejecutar'
        required: false
        default: 'plan'
        type: string
      manage_dns:
        description: 'Crear/actualizar Route 53 desde Terraform'
        required: false
        default: false
        type: boolean
  workflow_dispatch:
    inputs:
      action:
        description: 'Acción a ejecutar'
        required: true
        default: 'plan'
        type: choice
        options: [plan, apply]
      manage_dns:
        description: 'Crear/actualizar Route 53 desde Terraform'
        required: true
        default: false
        type: boolean

# OIDC requiere permiso para solicitar el token JWT de GitHub
permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

defaults:
  run:
    working-directory: infra/terraform

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    outputs:
      manage_dns: ${{ steps.config.outputs.manage_dns }}
      action: ${{ steps.config.outputs.action }}

    steps:
      - name: Determine Terraform mode
        id: config
        working-directory: ${{ github.workspace }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "manage_dns=${{ github.event.inputs.manage_dns }}" >> "$GITHUB_OUTPUT"
            echo "action=${{ github.event.inputs.action }}" >> "$GITHUB_OUTPUT"
          else
            echo "manage_dns=${{ inputs.manage_dns }}" >> "$GITHUB_OUTPUT"
            echo "action=${{ inputs.action }}" >> "$GITHUB_OUTPUT"
          fi

  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: preflight
    timeout-minutes: 20
    env:
      TF_VAR_do_token: ${{ secrets.DO_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Derive SSH public key from deploy key
        run: |
          umask 077
          printf '%s\n' '${{ secrets.DO_SSH_PRIVATE_KEY }}' > /tmp/ebuddy-deploy-key
          echo "TF_VAR_ssh_pub_key=$(ssh-keygen -y -f /tmp/ebuddy-deploy-key)" >> $GITHUB_ENV

      # Asume el rol IAM vía OIDC — inyecta AWS_ACCESS_KEY_ID/SECRET/SESSION_TOKEN
      # El rol tiene permisos mínimos: solo Route 53 (ver docs/iam/README.md)
      - name: Configure AWS credentials (OIDC)
        if: ${{ needs.preflight.outputs.manage_dns == 'true' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROUTE53_ROLE_ARN }}
          aws-region: us-east-1

      # Crea el DO Space para estado de Terraform si no existe.
      # Debe existir ANTES de terraform init (es el backend remoto).
      # Las credenciales de DO Spaces se pasan vía -backend-config en terraform init.
      - name: Create Terraform state bucket (idempotent)
        working-directory: ${{ github.workspace }}
        run: |
          AWS_ACCESS_KEY_ID=${{ secrets.DO_SPACES_ACCESS_KEY }} \
          AWS_SECRET_ACCESS_KEY=${{ secrets.DO_SPACES_SECRET_KEY }} \
          aws s3api create-bucket \
            --bucket ebuddy-tfstate \
            --region us-east-1 \
            --endpoint-url https://nyc3.digitaloceanspaces.com 2>&1 \
            | grep -v "BucketAlreadyOwnedByYou" || true

      - name: Load config → TF_VAR_*
        working-directory: ${{ github.workspace }}
        run: |
          source infra/config/main.env
          echo "TF_VAR_do_region=$DO_REGION"       >> $GITHUB_ENV
          echo "TF_VAR_app_name=$APP_NAME"         >> $GITHUB_ENV
          echo "TF_VAR_environment=$ENVIRONMENT"   >> $GITHUB_ENV
          echo "TF_VAR_domain_name=$DOMAIN_NAME"   >> $GITHUB_ENV
          echo "TF_VAR_droplet_size=$DROPLET_SIZE" >> $GITHUB_ENV
          echo "TF_VAR_alert_email=$ALERT_EMAIL"   >> $GITHUB_ENV
          echo "TF_VAR_enable_route53=${{ needs.preflight.outputs.manage_dns }}" >> $GITHUB_ENV

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~> 1.7'

      # Credenciales DO Spaces vía -backend-config para no pisar las de OIDC (AWS)
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="access_key=${{ secrets.DO_SPACES_ACCESS_KEY }}" \
            -backend-config="secret_key=${{ secrets.DO_SPACES_SECRET_KEY }}"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -no-color

  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [preflight, plan]
    if: needs.preflight.outputs.action == 'apply'
    timeout-minutes: 30
    env:
      TF_VAR_do_token: ${{ secrets.DO_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Derive SSH public key from deploy key
        run: |
          umask 077
          printf '%s\n' '${{ secrets.DO_SSH_PRIVATE_KEY }}' > /tmp/ebuddy-deploy-key
          echo "TF_VAR_ssh_pub_key=$(ssh-keygen -y -f /tmp/ebuddy-deploy-key)" >> $GITHUB_ENV

      - name: Configure AWS credentials (OIDC)
        if: ${{ needs.preflight.outputs.manage_dns == 'true' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROUTE53_ROLE_ARN }}
          aws-region: us-east-1

      - name: Create Terraform state bucket (idempotent)
        working-directory: ${{ github.workspace }}
        run: |
          AWS_ACCESS_KEY_ID=${{ secrets.DO_SPACES_ACCESS_KEY }} \
          AWS_SECRET_ACCESS_KEY=${{ secrets.DO_SPACES_SECRET_KEY }} \
          aws s3api create-bucket \
            --bucket ebuddy-tfstate \
            --region us-east-1 \
            --endpoint-url https://nyc3.digitaloceanspaces.com 2>&1 \
            | grep -v "BucketAlreadyOwnedByYou" || true

      - name: Load config → TF_VAR_*
        working-directory: ${{ github.workspace }}
        run: |
          source infra/config/main.env
          echo "TF_VAR_do_region=$DO_REGION"       >> $GITHUB_ENV
          echo "TF_VAR_app_name=$APP_NAME"         >> $GITHUB_ENV
          echo "TF_VAR_environment=$ENVIRONMENT"   >> $GITHUB_ENV
          echo "TF_VAR_domain_name=$DOMAIN_NAME"   >> $GITHUB_ENV
          echo "TF_VAR_droplet_size=$DROPLET_SIZE" >> $GITHUB_ENV
          echo "TF_VAR_alert_email=$ALERT_EMAIL"   >> $GITHUB_ENV
          echo "TF_VAR_enable_route53=${{ needs.preflight.outputs.manage_dns }}" >> $GITHUB_ENV

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~> 1.7'

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="access_key=${{ secrets.DO_SPACES_ACCESS_KEY }}" \
            -backend-config="secret_key=${{ secrets.DO_SPACES_SECRET_KEY }}"

      - name: Terraform Apply
        run: terraform apply -auto-approve -no-color

      # deploy.yml obtiene la IP del Droplet via API de DO en tiempo real
      # y deriva el registry name desde main.env — no necesita GitHub Variables.
      - name: Print outputs
        run: |
          echo "✓ Droplet IP: $(terraform output -raw droplet_ip)"
          echo "✓ Registry:   $(terraform output -raw registry_endpoint)"
