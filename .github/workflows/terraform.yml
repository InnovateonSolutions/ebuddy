name: Terraform — Infrastructure

on:
  push:
    branches: [main]
    paths:
      - 'infra/terraform/**'
  pull_request:
    branches: [main]
    paths:
      - 'infra/terraform/**'
  workflow_dispatch: # permite correr manualmente desde GitHub UI

defaults:
  run:
    working-directory: infra/terraform

env:
  # Variables de Terraform — inyectadas desde GitHub secrets/vars
  # Equivalente a tener terraform.tfvars en CI sin commitear el archivo
  TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
  TF_VAR_do_region: ${{ vars.DO_REGION }}
  TF_VAR_app_name: ${{ vars.APP_NAME }}
  TF_VAR_environment: ${{ vars.ENVIRONMENT }}
  TF_VAR_domain_name: ${{ vars.DOMAIN_NAME }}
  TF_VAR_alert_email: ${{ vars.ALERT_EMAIL }}
  TF_VAR_ssh_pub_key: ${{ vars.DO_SSH_PUB_KEY }}
  TF_VAR_droplet_size: ${{ vars.DROPLET_SIZE }}
  # Credenciales del backend S3-compatible (DO Spaces)
  # Son distintas al DO_TOKEN — se generan en DO → API → Spaces Keys
  AWS_ACCESS_KEY_ID: ${{ secrets.DO_SPACES_ACCESS_KEY }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACES_SECRET_KEY }}

jobs:
  # ── Plan — corre en PRs y en push a main ─────────────────────
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~> 1.7'

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -no-color
        continue-on-error: false

  # ── Apply — solo en push a main ───────────────────────────────
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~> 1.7'

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve -no-color

      - name: Show outputs
        run: terraform output -no-color
