name: Terraform — Infrastructure

# Ejecución manual únicamente — la infra no cambia en cada deploy
# Para correr: GitHub → Actions → Terraform — Infrastructure → Run workflow
on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Acción a ejecutar'
        required: true
        default: 'plan'
        type: choice
        options: [plan, apply]

# OIDC requiere permiso para solicitar el token JWT de GitHub
permissions:
  id-token: write
  contents: read

defaults:
  run:
    working-directory: infra/terraform

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    env:
      TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
      TF_VAR_ssh_pub_key: ${{ vars.DO_SSH_PUB_KEY }}

    steps:
      - uses: actions/checkout@v4

      # Asume el rol IAM vía OIDC — inyecta AWS_ACCESS_KEY_ID/SECRET/SESSION_TOKEN
      # El rol tiene permisos mínimos: solo Route 53 (ver docs/iam/README.md)
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROUTE53_ROLE_ARN }}
          aws-region: us-east-1

      # Crea el DO Space para estado de Terraform si no existe.
      # Debe existir ANTES de terraform init (es el backend remoto).
      # Las credenciales de DO Spaces se pasan vía -backend-config en terraform init.
      - name: Create Terraform state bucket (idempotent)
        working-directory: ${{ github.workspace }}
        run: |
          AWS_ACCESS_KEY_ID=${{ secrets.DO_SPACES_ACCESS_KEY }} \
          AWS_SECRET_ACCESS_KEY=${{ secrets.DO_SPACES_SECRET_KEY }} \
          aws s3api create-bucket \
            --bucket ebuddy-tfstate \
            --region us-east-1 \
            --endpoint-url https://nyc3.digitaloceanspaces.com 2>&1 \
            | grep -v "BucketAlreadyOwnedByYou" || true

      - name: Load config → TF_VAR_*
        working-directory: ${{ github.workspace }}
        run: |
          source infra/config/main.env
          echo "TF_VAR_do_region=$DO_REGION"       >> $GITHUB_ENV
          echo "TF_VAR_app_name=$APP_NAME"         >> $GITHUB_ENV
          echo "TF_VAR_environment=$ENVIRONMENT"   >> $GITHUB_ENV
          echo "TF_VAR_domain_name=$DOMAIN_NAME"   >> $GITHUB_ENV
          echo "TF_VAR_droplet_size=$DROPLET_SIZE" >> $GITHUB_ENV
          echo "TF_VAR_alert_email=$ALERT_EMAIL"   >> $GITHUB_ENV

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~> 1.7'

      # Credenciales DO Spaces vía -backend-config para no pisar las de OIDC (AWS)
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="access_key=${{ secrets.DO_SPACES_ACCESS_KEY }}" \
            -backend-config="secret_key=${{ secrets.DO_SPACES_SECRET_KEY }}"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -no-color

  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: plan
    if: github.event.inputs.action == 'apply'
    env:
      TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
      TF_VAR_ssh_pub_key: ${{ vars.DO_SSH_PUB_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROUTE53_ROLE_ARN }}
          aws-region: us-east-1

      - name: Create Terraform state bucket (idempotent)
        working-directory: ${{ github.workspace }}
        run: |
          AWS_ACCESS_KEY_ID=${{ secrets.DO_SPACES_ACCESS_KEY }} \
          AWS_SECRET_ACCESS_KEY=${{ secrets.DO_SPACES_SECRET_KEY }} \
          aws s3api create-bucket \
            --bucket ebuddy-tfstate \
            --region us-east-1 \
            --endpoint-url https://nyc3.digitaloceanspaces.com 2>&1 \
            | grep -v "BucketAlreadyOwnedByYou" || true

      - name: Load config → TF_VAR_*
        working-directory: ${{ github.workspace }}
        run: |
          source infra/config/main.env
          echo "TF_VAR_do_region=$DO_REGION"       >> $GITHUB_ENV
          echo "TF_VAR_app_name=$APP_NAME"         >> $GITHUB_ENV
          echo "TF_VAR_environment=$ENVIRONMENT"   >> $GITHUB_ENV
          echo "TF_VAR_domain_name=$DOMAIN_NAME"   >> $GITHUB_ENV
          echo "TF_VAR_droplet_size=$DROPLET_SIZE" >> $GITHUB_ENV
          echo "TF_VAR_alert_email=$ALERT_EMAIL"   >> $GITHUB_ENV

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~> 1.7'

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="access_key=${{ secrets.DO_SPACES_ACCESS_KEY }}" \
            -backend-config="secret_key=${{ secrets.DO_SPACES_SECRET_KEY }}"

      - name: Terraform Apply
        run: terraform apply -auto-approve -no-color

      # deploy.yml obtiene la IP del Droplet via API de DO en tiempo real
      # y deriva el registry name desde main.env — no necesita GitHub Variables.
      - name: Print outputs
        run: |
          echo "✓ Droplet IP: $(terraform output -raw droplet_ip)"
          echo "✓ Registry:   $(terraform output -raw registry_endpoint)"
