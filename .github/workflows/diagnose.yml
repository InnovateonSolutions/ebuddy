name: Diagnose
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Get Droplet IP
        id: droplet
        run: |
          IP=$(curl -sf "https://api.digitalocean.com/v2/droplets?name=ebuddy-dev-droplet" \
            -H "Authorization: Bearer ${{ secrets.DO_TOKEN }}" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(next(n['ip_address'] for n in d['droplets'][0]['networks']['v4'] if n['type']=='public'))")
          echo "ip=$IP" >> $GITHUB_OUTPUT

      - name: Force add archived column directly
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ steps.droplet.outputs.ip }}
          username: root
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          script: |
            DB_URL=$(grep DATABASE_URL /opt/ebuddy/.env | cut -d= -f2-)
            docker run --rm -e DATABASE_URL="$DB_URL" \
              registry.digitalocean.com/ebuddy-dev/ebuddy:migrator \
              node -e "
              const { Pool } = require('pg');
              const pool = new Pool({ connectionString: process.env.DATABASE_URL });
              pool.query(\"ALTER TABLE tickets ADD COLUMN IF NOT EXISTS archived boolean NOT NULL DEFAULT false\")
                .then(r => { console.log('OK: archived column added/exists'); pool.end(); })
                .catch(e => { console.error('FAIL:', e.message); pool.end(); process.exit(1); });
              " 2>&1
            echo "Column fix done"
