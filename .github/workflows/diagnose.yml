name: Diagnose
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get Droplet IP
        id: droplet
        run: |
          IP=$(DROPLET_NAME="ebuddy-prod-droplet" DO_TOKEN="${{ secrets.DO_TOKEN }}" \
            python3 scripts/get-droplet-ip.py)
          echo "ip=$IP" >> $GITHUB_OUTPUT

      - name: Fix archived column via psql
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ steps.droplet.outputs.ip }}
          username: root
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          script: |
            DB_URL=$(grep DATABASE_URL /opt/ebuddy/.env | cut -d= -f2-)
            echo "DB_URL found: ${#DB_URL} chars"
            docker run --rm -e PGPASSWORD="" postgres:16-alpine \
              sh -c "psql \"$DB_URL\" -c \"ALTER TABLE tickets ADD COLUMN IF NOT EXISTS archived boolean NOT NULL DEFAULT false;\" && echo 'COLUMN OK'" 2>&1
