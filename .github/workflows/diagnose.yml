name: Diagnose
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Get Droplet IP
        id: droplet
        run: |
          IP=$(curl -sf "https://api.digitalocean.com/v2/droplets?name=ebuddy-prod-droplet" \
            -H "Authorization: Bearer ${{ secrets.DO_TOKEN }}" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(next(n['ip_address'] for n in d['droplets'][0]['networks']['v4'] if n['type']=='public'))")
          echo "ip=$IP" >> $GITHUB_OUTPUT

      - name: Fix archived column via psql
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ steps.droplet.outputs.ip }}
          username: root
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          script: |
            DB_URL=$(grep DATABASE_URL /opt/ebuddy/.env | cut -d= -f2-)
            echo "DB_URL found: ${#DB_URL} chars"
            docker run --rm -e PGPASSWORD="" postgres:16-alpine \
              sh -c "psql \"$DB_URL\" -c \"ALTER TABLE tickets ADD COLUMN IF NOT EXISTS archived boolean NOT NULL DEFAULT false;\" && echo 'COLUMN OK'" 2>&1
