name: DB — Connectivity Check

# Correr manualmente después de `terraform apply` para verificar que la DB es accesible.
on:
  workflow_dispatch:

jobs:
  check:
    name: PostgreSQL TCP + TLS
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: scripts/go.mod

      - name: Build connectivity checker
        working-directory: scripts
        run: go build -o /tmp/check-db ./check-db/

      - name: Check TCP + TLS connectivity to PostgreSQL
        run: /tmp/check-db
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  init:
    name: Initialize DB Schema
    runs-on: ubuntu-latest
    needs: check

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install jinja2

      - name: Render init SQL
        run: python3 scripts/db-init.py --output /tmp/init.sql
        env:
          ENVIRONMENT: prod

      - name: Install PostgreSQL client
        run: sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Apply schema
        run: psql "$DATABASE_URL" -f /tmp/init.sql
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
