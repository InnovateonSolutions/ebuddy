name: Deploy

on:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_PUBLIC_APP_URL: https://ebuddy.innovateoncorp.com

jobs:
  # ── 1. Build + Migrations en paralelo ──────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      # Deriva IMAGE_NAME desde main.env — sin GitHub Variables
      - name: Load config
        run: |
          source infra/config/main.env
          echo "IMAGE_NAME=registry.digitalocean.com/${APP_NAME}-${ENVIRONMENT}/${APP_NAME}" >> $GITHUB_ENV

      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_TOKEN }}

      # Elimina tags viejos y libera espacio — antes del login para no invalidar credenciales
      - name: Cleanup old images
        run: |
          source infra/config/main.env
          REGISTRY="${APP_NAME}-${ENVIRONMENT}"
          REPO="${APP_NAME}"

          # Borra todos los tags excepto latest y buildcache
          doctl registry repository list-tags "$REGISTRY/$REPO" \
            --no-header --format Tag 2>/dev/null \
          | grep -v -E "^latest$|^buildcache$" \
          | while read tag; do
              doctl registry repository delete-tag "$REGISTRY/$REPO" "$tag" --force
            done

          # Garbage collection — si ya hay una activa la ignora
          doctl registry garbage-collection start "$REGISTRY" --force --include-untagged-manifests 2>&1 \
            | grep -v "only one active garbage collection" || true

      # Login DESPUÉS del cleanup para que las credenciales sean válidas al hacer push
      - run: doctl registry login --expiry-seconds 1200

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ env.NEXT_PUBLIC_APP_URL }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max

  # ── 2. Migraciones de DB con Drizzle (paralelo con build) ───
  migrate:
    name: DB Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Apply pending migrations
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL no configurada; se omiten migraciones en este deploy bootstrap."
            exit 0
          fi

          npx drizzle-kit migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ── 3. Deploy al Droplet (espera build + migrate) ──────────
  deploy:
    name: Deploy to Droplet
    runs-on: ubuntu-latest
    needs: [build, migrate]
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      # Obtiene la IP del Droplet en tiempo real — sin GitHub Variables
      - name: Get Droplet IP
        id: droplet
        run: |
          source infra/config/main.env
          DROPLET_NAME="${APP_NAME}-${ENVIRONMENT}-droplet"

          IP=$(curl -sf \
            "https://api.digitalocean.com/v2/droplets?name=${DROPLET_NAME}" \
            -H "Authorization: Bearer ${{ secrets.DO_TOKEN }}" \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          droplets = data.get('droplets', [])
          if not droplets:
              raise SystemExit(f'Droplet {\"$DROPLET_NAME\"} not found')
          nets = droplets[0]['networks']['v4']
          ip = next(n['ip_address'] for n in nets if n['type'] == 'public')
          print(ip)
          ")
          echo "ip=$IP" >> $GITHUB_OUTPUT
          echo "✓ Droplet IP: $IP"

      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ steps.droplet.outputs.ip }}
          username: root
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          script: /usr/local/bin/ebuddy-deploy

  # ── 4. Smoke tests E2E ──────────────────────────────────────
  e2e:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    timeout-minutes: 15

    steps:
      - name: Wait for container startup
        run: sleep 60

      - name: Health endpoint returns ok
        run: |
          BODY=$(curl -sf https://ebuddy.innovateoncorp.com/api/health)
          echo "$BODY"
          echo "$BODY" | grep -q '"status":"ok"' || { echo "FAIL: health check"; exit 1; }
          echo "PASS: /api/health"

      - name: Login page is reachable
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://ebuddy.innovateoncorp.com/login)
          [ "$STATUS" = "200" ] || { echo "FAIL: /login returned $STATUS"; exit 1; }
          echo "PASS: /login"

      - name: Protected routes reject unauthenticated requests
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://ebuddy.innovateoncorp.com/api/tickets/today)
          [ "$STATUS" = "401" ] || { echo "FAIL: /api/tickets/today returned $STATUS (expected 401)"; exit 1; }
          echo "PASS: auth protection on /api/tickets/today"

      - name: Root redirects to dashboard or login
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L https://ebuddy.innovateoncorp.com/)
          [ "$STATUS" = "200" ] || { echo "FAIL: / returned $STATUS"; exit 1; }
          echo "PASS: root redirect"
