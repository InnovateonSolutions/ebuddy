name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'infra/**'
      - 'docs/**'
      - '*.md'

env:
  NEXT_PUBLIC_APP_URL: https://app.ebuddy.io
  NEXT_PUBLIC_SUPABASE_URL: https://nncikrxfpchwaqeuvrll.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

jobs:
  # ── 1. Build + Migrations en paralelo ──────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Deriva IMAGE_NAME desde main.env — sin GitHub Variables
      - name: Load config
        run: |
          source infra/config/main.env
          echo "IMAGE_NAME=registry.digitalocean.com/${APP_NAME}-${ENVIRONMENT}/${APP_NAME}" >> $GITHUB_ENV

      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_TOKEN }}

      - run: doctl registry login --expiry-seconds 1200

      # Elimina tags viejos — mantiene solo latest y el sha anterior
      # Luego corre garbage collection para liberar espacio real en disco
      - name: Cleanup old images
        run: |
          source infra/config/main.env
          REGISTRY="${APP_NAME}-${ENVIRONMENT}"
          REPO="${APP_NAME}"

          # Borra todos los tags excepto latest y buildcache
          doctl registry repository list-tags "$REGISTRY/$REPO" \
            --no-header --format Tag \
          | grep -v -E "^latest$|^buildcache$" \
          | while read tag; do
              doctl registry repository delete-tag "$REGISTRY/$REPO" "$tag" --force
            done

          # Garbage collection para liberar el espacio físico
          doctl registry garbage-collection start "$REGISTRY" --force --include-untagged-manifests

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ env.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_APP_URL=${{ env.NEXT_PUBLIC_APP_URL }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max

  # ── 2. Migraciones de DB (paralelo con build) ──────────────
  migrate:
    name: DB Migrations
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply pending migrations
        run: |
          supabase link --project-ref nncikrxfpchwaqeuvrll
          supabase db push --password "${{ secrets.SUPABASE_DB_PASSWORD }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # ── 3. Deploy al Droplet (espera build + migrate) ──────────
  deploy:
    name: Deploy to Droplet
    runs-on: ubuntu-latest
    needs: [build, migrate]

    steps:
      - uses: actions/checkout@v4

      # Obtiene la IP del Droplet en tiempo real — sin GitHub Variables
      - name: Get Droplet IP
        id: droplet
        run: |
          source infra/config/main.env
          DROPLET_NAME="${APP_NAME}-${ENVIRONMENT}-droplet"

          pip install --quiet doctl 2>/dev/null || true

          IP=$(curl -sf \
            "https://api.digitalocean.com/v2/droplets?name=${DROPLET_NAME}" \
            -H "Authorization: Bearer ${{ secrets.DO_TOKEN }}" \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          droplets = data.get('droplets', [])
          if not droplets:
              raise SystemExit(f'Droplet {\"$DROPLET_NAME\"} not found')
          nets = droplets[0]['networks']['v4']
          ip = next(n['ip_address'] for n in nets if n['type'] == 'public')
          print(ip)
          ")
          echo "ip=$IP" >> $GITHUB_OUTPUT
          echo "✓ Droplet IP: $IP"

      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ steps.droplet.outputs.ip }}
          username: root
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          envs: NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY,NEXT_PUBLIC_APP_URL
          script: |
            cat > /opt/ebuddy/.env << ENVEOF
            NEXT_PUBLIC_SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL
            NEXT_PUBLIC_SUPABASE_ANON_KEY=$NEXT_PUBLIC_SUPABASE_ANON_KEY
            SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
            ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            NEXT_PUBLIC_APP_URL=$NEXT_PUBLIC_APP_URL
            ENVEOF
            chmod 600 /opt/ebuddy/.env
            /usr/local/bin/ebuddy-deploy

  # ── 4. Smoke tests E2E ──────────────────────────────────────
  e2e:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Wait for container startup
        run: sleep 60

      - name: Health endpoint returns ok
        run: |
          BODY=$(curl -sf https://app.ebuddy.io/api/health)
          echo "$BODY"
          echo "$BODY" | grep -q '"status":"ok"' || { echo "FAIL: health check"; exit 1; }
          echo "PASS: /api/health"

      - name: Login page is reachable
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://app.ebuddy.io/login)
          [ "$STATUS" = "200" ] || { echo "FAIL: /login returned $STATUS"; exit 1; }
          echo "PASS: /login"

      - name: Protected routes reject unauthenticated requests
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://app.ebuddy.io/api/tickets/today)
          [ "$STATUS" = "401" ] || { echo "FAIL: /api/tickets/today returned $STATUS (expected 401)"; exit 1; }
          echo "PASS: auth protection on /api/tickets/today"

      - name: Root redirects to dashboard or login
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L https://app.ebuddy.io/)
          [ "$STATUS" = "200" ] || { echo "FAIL: / returned $STATUS"; exit 1; }
          echo "PASS: root redirect"
