name: Build → DOCR → Droplet Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'infra/terraform/**'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'infra/terraform/**'
      - 'docs/**'

env:
  IMAGE_NAME: registry.digitalocean.com/${{ vars.DO_REGISTRY_NAME }}/ebuddy
  # Valores públicos — commiteados también en infra/config/main.env
  NEXT_PUBLIC_APP_URL: https://app.ebuddy.io
  NEXT_PUBLIC_SUPABASE_URL: https://nncikrxfpchwaqeuvrll.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: REEMPLAZAR_CON_sb_publishable_COMPLETO

jobs:
  # ── 1. Build y push imagen a DOCR ───────────────────────────
  build:
    name: Build & Push to DOCR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_TOKEN }}

      - name: Login to DOCR
        run: doctl registry login --expiry-seconds 1200

      - name: Docker meta (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ env.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_APP_URL=${{ env.NEXT_PUBLIC_APP_URL }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max

  # ── 2. Deploy al Droplet (solo en push a main) ───────────────
  deploy:
    name: Deploy to Droplet
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write .env and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.DO_DROPLET_IP }}
          username: root
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          script: |
            cat > /opt/ebuddy/.env << 'ENVEOF'
            NEXT_PUBLIC_SUPABASE_URL=${{ env.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
            ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            NEXT_PUBLIC_APP_URL=${{ env.NEXT_PUBLIC_APP_URL }}
            ENVEOF
            chmod 600 /opt/ebuddy/.env

            /usr/local/bin/ebuddy-deploy
