name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

env:
  NEXT_PUBLIC_APP_URL: https://ebuddy.innovateoncorp.com
  NEXT_PUBLIC_GOOGLE_AUTH_ENABLED: "true"

jobs:
  # ── 1. Build (app + migrator) ─────────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      github.event_name != 'workflow_run' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main' &&
        github.event.workflow_run.event == 'push'
      )

    steps:
      - uses: actions/checkout@v4

      # Deriva IMAGE_NAME desde main.env — sin GitHub Variables
      - name: Load config
        run: |
          source infra/config/main.env
          echo "IMAGE_NAME=registry.digitalocean.com/${APP_NAME}-${ENVIRONMENT}/${APP_NAME}" >> $GITHUB_ENV

      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      # Escribe credenciales DOCR directamente en ~/.docker/config.json (inline
      # base64, sin credential helpers del sistema). El credential store de Ubuntu
      # (secretservice/pass) no es accesible desde el container del buildx driver
      # → 401 al pushear.
      #
      # IMPORTANTE: debe ejecutarse ANTES de setup-buildx-action para que el
      # container buildkitd monte ~/.docker/config.json con las credenciales ya escritas.
      # Usar DOCKER_CONFIG=/tmp/... no funciona — buildkitd usa ~/.docker del host.
      #
      # Root cause 401: DO_TOKEN directamente como password en Basic Auth evita
      # tokens derivados de corta duración que el endpoint oauth rechaza intermitentemente.
      - name: Configure DOCR credentials
        env:
          DO_TOKEN: ${{ secrets.DO_TOKEN }}
        run: |
          mkdir -p ~/.docker
          AUTH="$(printf 'docr:%s' "${DO_TOKEN}" | base64 -w 0)"
          printf '{"auths":{"registry.digitalocean.com":{"auth":"%s"}}}\n' "${AUTH}" \
            > ~/.docker/config.json
          echo "✓ DOCR credentials written to ~/.docker/config.json"

      - uses: docker/setup-buildx-action@v3

      - name: Build & Push app image
        id: build_app
        uses: docker/build-push-action@v5
        continue-on-error: true
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ env.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_GOOGLE_AUTH_ENABLED=${{ env.NEXT_PUBLIC_GOOGLE_AUTH_ENABLED }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max

      # DOCR token endpoint devuelve 401 intermitentemente — retry con 30s delay
      - name: Retry Build & Push app image
        if: steps.build_app.outcome == 'failure'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ env.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_GOOGLE_AUTH_ENABLED=${{ env.NEXT_PUBLIC_GOOGLE_AUTH_ENABLED }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max

      # Migrator: imagen mínima con drizzle-kit. Las migraciones corren desde
      # el Droplet (red confiable de DO) — los runners de CI no tienen acceso a la DB.
      - name: Build & Push migrator image
        id: build_migrator
        uses: docker/build-push-action@v5
        continue-on-error: true
        with:
          context: .
          target: migrator
          push: true
          tags: registry.digitalocean.com/ebuddy-dev/ebuddy:migrator
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: Retry Build & Push migrator image
        if: steps.build_migrator.outcome == 'failure'
        uses: docker/build-push-action@v5
        with:
          context: .
          target: migrator
          push: true
          tags: registry.digitalocean.com/ebuddy-dev/ebuddy:migrator
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max


  # ── 2. Deploy al Droplet ──────────────────────────────────────
  # Migraciones corren desde el Droplet (red confiable DO → DB).
  # GitHub Actions runners no tienen acceso al DO Managed DB (firewall: solo Droplet).
  deploy:
    name: Deploy to Droplet
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 15
    if: needs.build.result == 'success'

    steps:
      - uses: actions/checkout@v4

      # Obtiene la IP del Droplet en tiempo real — sin GitHub Variables
      - name: Get Droplet IP
        id: droplet
        run: |
          source infra/config/main.env
          DROPLET_NAME="${APP_NAME}-${ENVIRONMENT}-droplet"

          IP=$(curl -sf \
            "https://api.digitalocean.com/v2/droplets?name=${DROPLET_NAME}" \
            -H "Authorization: Bearer ${{ secrets.DO_TOKEN }}" \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          droplets = data.get('droplets', [])
          if not droplets:
              raise SystemExit(f'Droplet {\"$DROPLET_NAME\"} not found')
          nets = droplets[0]['networks']['v4']
          ip = next(n['ip_address'] for n in nets if n['type'] == 'public')
          print(ip)
          ")
          echo "ip=$IP" >> $GITHUB_OUTPUT
          echo "✓ Droplet IP: $IP"

      # Actualiza Caddyfile antes del deploy para que los headers de seguridad
      # estén presentes desde el primer request (edge case: cloud-init solo corre una vez).
      - name: Update Caddyfile on Droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ steps.droplet.outputs.ip }}
          username: root
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          source: infra/caddy/Caddyfile
          target: /opt/ebuddy/
          strip_components: 2

      # Escribe /opt/ebuddy/.env con los valores actuales de GitHub Secrets
      # y corre migraciones desde el Droplet (red confiable → puede conectar a DO Managed DB).
      - name: Write .env and run migrations on Droplet
        uses: appleboy/ssh-action@v1
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REDIRECT_URI: ${{ secrets.GOOGLE_REDIRECT_URI }}
        with:
          host: ${{ steps.droplet.outputs.ip }}
          username: root
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          envs: DATABASE_URL,AUTH_SECRET,OPENAI_API_KEY,ANTHROPIC_API_KEY,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,GOOGLE_REDIRECT_URI
          script: |
            # Sobreescribir .env con valores actuales (grep preserva formato KEY=VALUE)
            env | grep -E '^(DATABASE_URL|AUTH_SECRET|OPENAI_API_KEY|ANTHROPIC_API_KEY|GOOGLE_CLIENT_ID|GOOGLE_CLIENT_SECRET|GOOGLE_REDIRECT_URI)=' \
              > /opt/ebuddy/.env
            echo "NODE_ENV=production" >> /opt/ebuddy/.env
            echo "AUTH_URL=https://ebuddy.innovateoncorp.com" >> /opt/ebuddy/.env
            chmod 600 /opt/ebuddy/.env

            # Correr migraciones — el Droplet está en red confiable de DO (DB firewall: solo Droplet)
            docker pull registry.digitalocean.com/ebuddy-dev/ebuddy:migrator
            docker run --rm \
              --env-file /opt/ebuddy/.env \
              registry.digitalocean.com/ebuddy-dev/ebuddy:migrator
            echo "Migraciones completadas"

      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ steps.droplet.outputs.ip }}
          username: root
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          script: |
            /usr/local/bin/ebuddy-deploy
            # Dar tiempo a que los contenedores estén completamente listos
            sleep 15
            # Recargar Caddy para aplicar cambios del Caddyfile (sin downtime).
            # Si reload falla (caddy aún arrancando tras recreación del app container),
            # forzar recreación del contenedor caddy.
            docker compose -f /opt/ebuddy/docker-compose.prod.yml exec -T caddy caddy reload --config /etc/caddy/Caddyfile \
              || docker compose -f /opt/ebuddy/docker-compose.prod.yml up -d --force-recreate caddy
            echo "Caddy actualizado con nuevo Caddyfile"

  # ── 3. Smoke tests E2E ──────────────────────────────────────
  e2e:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    timeout-minutes: 15
    if: needs.deploy.result == 'success'

    steps:
      - uses: actions/checkout@v4

      - name: Wait for container startup
        run: sleep 60

      - name: Run smoke tests
        run: bash scripts/e2e/smoke.sh
        env:
          APP_URL: https://ebuddy.innovateoncorp.com
