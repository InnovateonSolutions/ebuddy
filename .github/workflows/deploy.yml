name: Deploy

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  actions: write  # necesario para cache-to: type=gha en workflow_call

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_PUBLIC_APP_URL: https://ebuddy.innovateoncorp.com

jobs:
  # ── 1. Build + Migrations en paralelo ──────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      # Deriva IMAGE_NAME desde main.env — sin GitHub Variables
      - name: Load config
        run: |
          source infra/config/main.env
          echo "IMAGE_NAME=registry.digitalocean.com/${APP_NAME}-${ENVIRONMENT}/${APP_NAME}" >> $GITHUB_ENV

      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_TOKEN }}

      # Elimina tags viejos (sin garbage collection — el GC se hace DESPUÉS del push
      # para no bloquear el registry durante el build)
      - name: Delete old image tags
        run: |
          source infra/config/main.env
          REGISTRY="${APP_NAME}-${ENVIRONMENT}"
          REPO="${APP_NAME}"

          doctl registry repository list-tags "$REGISTRY/$REPO" \
            --no-header --format Tag 2>/dev/null \
          | grep -v -E "^latest$" \
          | while read tag; do
              doctl registry repository delete-tag "$REGISTRY/$REPO" "$tag" --force
            done

      # Si un GC anterior sigue activo, DOCR rechaza pushes con 401.
      # Espera hasta 5 minutos a que termine antes de hacer login.
      - name: Wait for active garbage collection to finish
        run: |
          source infra/config/main.env
          REGISTRY="${APP_NAME}-${ENVIRONMENT}"
          MAX_WAIT=300
          WAITED=0
          while doctl registry garbage-collection list "$REGISTRY" --no-header 2>/dev/null | grep -q "in_progress"; do
            echo "GC activa — esperando 15s... (${WAITED}s total)"
            sleep 15
            WAITED=$((WAITED + 15))
            [ "$WAITED" -ge "$MAX_WAIT" ] && { echo "Timeout esperando GC"; break; }
          done
          echo "Registry listo para push"

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      # Escribe credenciales DOCR directamente en ~/.docker/config.json (inline
      # base64, sin credential helpers del sistema). El credential store de Ubuntu
      # (secretservice/pass) no es accesible desde el container del buildx driver
      # → 401 al pushear. doctl registry docker-config produce el JSON estático.
      - name: Configure DOCR credentials
        run: |
          source infra/config/main.env
          REGISTRY="${APP_NAME}-${ENVIRONMENT}"
          doctl registry docker-config "$REGISTRY" > ~/.docker/config.json
          echo "✓ DOCR credentials written to ~/.docker/config.json"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ env.NEXT_PUBLIC_APP_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Garbage collection DESPUÉS del push — el registry no puede recibir pushes mientras GC corre
      - name: Garbage collect old untagged manifests
        run: |
          source infra/config/main.env
          REGISTRY="${APP_NAME}-${ENVIRONMENT}"
          doctl registry garbage-collection start "$REGISTRY" --force --include-untagged-manifests 2>&1 \
            | grep -v "only one active garbage collection" || true

  # ── 2. Migraciones de DB con Drizzle (paralelo con build) ───
  migrate:
    name: DB Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Apply pending migrations
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL no configurada; se omiten migraciones en este deploy bootstrap."
            exit 0
          fi

          npx drizzle-kit migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ── 3. Deploy al Droplet (espera build + migrate) ──────────
  deploy:
    name: Deploy to Droplet
    runs-on: ubuntu-latest
    needs: [build, migrate]
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      # Obtiene la IP del Droplet en tiempo real — sin GitHub Variables
      - name: Get Droplet IP
        id: droplet
        run: |
          source infra/config/main.env
          DROPLET_NAME="${APP_NAME}-${ENVIRONMENT}-droplet"

          IP=$(curl -sf \
            "https://api.digitalocean.com/v2/droplets?name=${DROPLET_NAME}" \
            -H "Authorization: Bearer ${{ secrets.DO_TOKEN }}" \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          droplets = data.get('droplets', [])
          if not droplets:
              raise SystemExit(f'Droplet {\"$DROPLET_NAME\"} not found')
          nets = droplets[0]['networks']['v4']
          ip = next(n['ip_address'] for n in nets if n['type'] == 'public')
          print(ip)
          ")
          echo "ip=$IP" >> $GITHUB_OUTPUT
          echo "✓ Droplet IP: $IP"

      # Actualiza Caddyfile antes del deploy para que los headers de seguridad
      # estén presentes desde el primer request (edge case: cloud-init solo corre una vez).
      - name: Update Caddyfile on Droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ steps.droplet.outputs.ip }}
          username: root
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          source: infra/caddy/Caddyfile
          target: /opt/ebuddy/
          strip_components: 2

      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ steps.droplet.outputs.ip }}
          username: root
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          script: |
            /usr/local/bin/ebuddy-deploy
            # Dar tiempo a que los contenedores estén completamente listos
            sleep 15
            # Recargar Caddy para aplicar cambios del Caddyfile (sin downtime).
            # Si reload falla (caddy aún arrancando tras recreación del app container),
            # forzar recreación del contenedor caddy.
            docker compose -f /opt/ebuddy/docker-compose.prod.yml exec -T caddy caddy reload --config /etc/caddy/Caddyfile \
              || docker compose -f /opt/ebuddy/docker-compose.prod.yml up -d --force-recreate caddy
            echo "Caddy actualizado con nuevo Caddyfile"

  # ── 4. Smoke tests E2E ──────────────────────────────────────
  e2e:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Wait for container startup
        run: sleep 60

      - name: Run smoke tests
        run: bash scripts/e2e/smoke.sh
        env:
          APP_URL: https://ebuddy.innovateoncorp.com
