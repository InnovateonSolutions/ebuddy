name: Deploy

# Corre solo en push a main (no en PRs — MVP de un solo usuario)
# paths-ignore: cambios solo en infra o docs no disparan un re-deploy
on:
  push:
    branches: [main]
    paths-ignore:
      - 'infra/**'
      - 'docs/**'
      - '*.md'

env:
  IMAGE_NAME: registry.digitalocean.com/${{ vars.DO_REGISTRY_NAME }}/ebuddy
  NEXT_PUBLIC_APP_URL: https://app.ebuddy.io
  NEXT_PUBLIC_SUPABASE_URL: https://nncikrxfpchwaqeuvrll.supabase.co
  # Anon key es pública por diseño — guardar como GitHub Variable (no Secret)
  # Settings → Secrets and variables → Actions → Variables → NEXT_PUBLIC_SUPABASE_ANON_KEY
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

jobs:
  # ── 1. Build + Migrations en paralelo ──────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_TOKEN }}

      - run: doctl registry login --expiry-seconds 1200

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ env.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_APP_URL=${{ env.NEXT_PUBLIC_APP_URL }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max

  # ── 2. Migraciones de DB (paralelo con build) ──────────────
  migrate:
    name: DB Migrations
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply pending migrations
        run: supabase db push --project-ref nncikrxfpchwaqeuvrll --password "${{ secrets.SUPABASE_DB_PASSWORD }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # ── 3. Deploy al Droplet (espera build + migrate) ──────────
  deploy:
    name: Deploy to Droplet
    runs-on: ubuntu-latest
    needs: [build, migrate]

    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.DO_DROPLET_IP }}
          username: root
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          envs: NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY,NEXT_PUBLIC_APP_URL
          script: |
            cat > /opt/ebuddy/.env << ENVEOF
            NEXT_PUBLIC_SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL
            NEXT_PUBLIC_SUPABASE_ANON_KEY=$NEXT_PUBLIC_SUPABASE_ANON_KEY
            SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
            ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            NEXT_PUBLIC_APP_URL=$NEXT_PUBLIC_APP_URL
            ENVEOF
            chmod 600 /opt/ebuddy/.env
            /usr/local/bin/ebuddy-deploy

  # ── 3. Smoke tests E2E contra producción ───────────────────
  e2e:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      # El healthcheck del contenedor tiene start_period: 60s
      - name: Wait for container startup
        run: sleep 60

      - name: Health endpoint returns ok
        run: |
          BODY=$(curl -sf https://app.ebuddy.io/api/health)
          echo "$BODY"
          echo "$BODY" | grep -q '"status":"ok"' || { echo "FAIL: health check"; exit 1; }
          echo "PASS: /api/health"

      - name: Login page is reachable
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://app.ebuddy.io/login)
          [ "$STATUS" = "200" ] || { echo "FAIL: /login returned $STATUS"; exit 1; }
          echo "PASS: /login"

      - name: Protected routes reject unauthenticated requests
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://app.ebuddy.io/api/tickets/today)
          [ "$STATUS" = "401" ] || { echo "FAIL: /api/tickets/today returned $STATUS (expected 401)"; exit 1; }
          echo "PASS: auth protection on /api/tickets/today"

      - name: Root redirects to dashboard or login
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L https://app.ebuddy.io/)
          [ "$STATUS" = "200" ] || { echo "FAIL: / returned $STATUS"; exit 1; }
          echo "PASS: root redirect"
