name: Droplet — Smoke Test

# Correr manualmente o automáticamente tras un Terraform apply exitoso.
on:
  workflow_dispatch:
  workflow_run:
    workflows: ['Terraform — Infrastructure']
    types: [completed]

jobs:
  smoke:
    name: SSH + HTTPS + Health
    runs-on: ubuntu-latest
    # Si es workflow_run, solo correr si Terraform fue exitoso
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: scripts/go.mod

      - name: Build smoke test
        working-directory: scripts
        run: go build -o /tmp/smoke-droplet ./smoke-droplet/

      - name: Resolve Droplet IP
        id: ip
        run: echo "droplet_ip=$(python3 scripts/get-droplet-ip.py)" >> "$GITHUB_OUTPUT"
        env:
          DO_TOKEN: ${{ secrets.DO_TOKEN }}
          DROPLET_NAME: ebuddy-prod-droplet

      - name: Run smoke test
        run: /tmp/smoke-droplet
        env:
          DROPLET_IP: ${{ steps.ip.outputs.droplet_ip }}
          APP_URL: https://app.ebuddy.io
