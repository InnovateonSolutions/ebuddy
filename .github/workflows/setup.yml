name: Setup — Server Playbooks

on:
  workflow_call:
    inputs:
      target:
        description: 'Servidor destino'
        required: true
        type: string
      playbook:
        description: 'Playbook a ejecutar'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      target:
        description: 'Servidor destino'
        required: true
        type: choice
        options: [elitemini, droplet]
      playbook:
        description: 'Playbook a ejecutar'
        required: true
        type: choice
        options: [install-node-exporter, install-tailscale, configure-openclaw, install-gitlab]

jobs:
  setup:
    name: '${{ inputs.playbook }} → ${{ inputs.target }}'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      # Une el runner a Tailscale para acceso directo a elitemini
      # TODO: migrar authkey → oauth-client-id + oauth-secret cuando se creen
      # credenciales OAuth en https://tailscale.com/s/oauth-clients
      - name: Connect to Tailscale
        if: inputs.target == 'elitemini'
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}

      - name: Install Ansible
        if: inputs.target == 'elitemini'
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install ansible-core

      - name: Load elitemini config
        if: inputs.target == 'elitemini'
        run: |
          source infra/config/main.env
          echo "GITLAB_DOMAIN_NAME=$GITLAB_DOMAIN_NAME" >> $GITHUB_ENV

      - name: Prepare Ansible SSH key
        if: inputs.target == 'elitemini'
        env:
          ELITEMINI_SSH_KEY: ${{ secrets.ELITEMINI_SSH_KEY }}
        run: |
          umask 077
          mkdir -p ~/.ssh
          printf '%s\n' "$ELITEMINI_SSH_KEY" > ~/.ssh/elitemini
          chmod 600 ~/.ssh/elitemini

      - name: Get Droplet IP
        id: droplet
        if: inputs.target == 'droplet'
        run: |
          source infra/config/main.env
          IP=$(DROPLET_NAME="${APP_NAME}-${ENVIRONMENT}-droplet" \
            DO_TOKEN="${{ secrets.DO_TOKEN }}" \
            python3 scripts/get-droplet-ip.py)
          echo "ip=$IP" >> $GITHUB_OUTPUT
          echo "✓ Droplet IP: $IP"

      # ── elitemini — directo vía Tailscale + Ansible ─────────
      - name: Run Ansible playbook on elitemini
        if: inputs.target == 'elitemini'
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          export ANSIBLE_CONFIG="$GITHUB_WORKSPACE/infra/ansible/ansible.cfg"
          export ANSIBLE_PRIVATE_KEY_FILE="$HOME/.ssh/elitemini"
          ansible-playbook \
            "infra/ansible/playbooks/${{ inputs.playbook }}.yml" \
            --extra-vars "tailscale_auth_key=${TAILSCALE_AUTH_KEY} gitlab_external_url=https://${GITLAB_DOMAIN_NAME} gitlab_nginx_listen_port=8929"

      # ── Droplet — IP pública directa ────────────────────────
      - name: Copy playbook to Droplet
        if: inputs.target == 'droplet'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ steps.droplet.outputs.ip }}
          username: root
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          source: infra/playbooks/${{ inputs.playbook }}.sh
          target: /tmp/
          strip_components: 2

      - name: Run playbook on Droplet
        if: inputs.target == 'droplet'
        uses: appleboy/ssh-action@v1
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        with:
          host: ${{ steps.droplet.outputs.ip }}
          username: root
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          envs: TAILSCALE_AUTH_KEY
          script: bash /tmp/${{ inputs.playbook }}.sh
