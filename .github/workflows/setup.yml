name: Setup — Server Playbooks

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Servidor destino'
        required: true
        type: choice
        options: [elitemini, droplet]
      playbook:
        description: 'Playbook a ejecutar'
        required: true
        type: choice
        options: [install-node-exporter, install-tailscale]

jobs:
  setup:
    name: '${{ inputs.playbook }} → ${{ inputs.target }}'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      # Une el runner a Tailscale para acceso directo a elitemini
      - name: Connect to Tailscale
        if: inputs.target == 'elitemini'
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}

      - name: Get Droplet IP
        id: droplet
        if: inputs.target == 'droplet'
        run: |
          source infra/config/main.env
          DROPLET_NAME="${APP_NAME}-${ENVIRONMENT}-droplet"
          IP=$(curl -sf \
            "https://api.digitalocean.com/v2/droplets?name=${DROPLET_NAME}" \
            -H "Authorization: Bearer ${{ secrets.DO_TOKEN }}" \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          droplets = data.get('droplets', [])
          if not droplets:
              raise SystemExit('Droplet not found')
          nets = droplets[0]['networks']['v4']
          ip = next(n['ip_address'] for n in nets if n['type'] == 'public')
          print(ip)
          ")
          echo "ip=$IP" >> $GITHUB_OUTPUT
          echo "✓ Droplet IP: $IP"

      # ── elitemini — directo vía Tailscale ───────────────────
      - name: Copy playbook to elitemini
        if: inputs.target == 'elitemini'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 100.80.59.3
          username: mct
          key: ${{ secrets.ELITEMINI_SSH_KEY }}
          source: infra/playbooks/${{ inputs.playbook }}.sh
          target: /tmp/
          strip_components: 2

      - name: Run playbook on elitemini
        if: inputs.target == 'elitemini'
        uses: appleboy/ssh-action@v1
        with:
          host: 100.80.59.3
          username: mct
          key: ${{ secrets.ELITEMINI_SSH_KEY }}
          script: sudo bash /tmp/${{ inputs.playbook }}.sh

      # ── Droplet — IP pública directa ────────────────────────
      - name: Copy playbook to Droplet
        if: inputs.target == 'droplet'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ steps.droplet.outputs.ip }}
          username: root
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          source: infra/playbooks/${{ inputs.playbook }}.sh
          target: /tmp/
          strip_components: 2

      - name: Run playbook on Droplet
        if: inputs.target == 'droplet'
        uses: appleboy/ssh-action@v1
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        with:
          host: ${{ steps.droplet.outputs.ip }}
          username: root
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          envs: TAILSCALE_AUTH_KEY
          script: bash /tmp/${{ inputs.playbook }}.sh
