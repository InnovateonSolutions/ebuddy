name: WhatsApp — Config Validation

# Correr manualmente después de configurar los secrets de WhatsApp Business API.
on:
  workflow_dispatch:

jobs:
  validate:
    name: Validate WhatsApp Business API Config
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate WhatsApp configuration
        run: bash scripts/check-whatsapp-config.sh
        env:
          WHATSAPP_API_TOKEN: ${{ secrets.WHATSAPP_API_TOKEN }}
          WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          WHATSAPP_BUSINESS_ACCOUNT_ID: ${{ secrets.WHATSAPP_BUSINESS_ACCOUNT_ID }}
